<!DOCTYPE html>

<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DHL Line Haul</title>

style.css

</head>

<body>

<header>

<h1>🚚 DHL Line Haul</h1>

<p id="dataAtual"></p>

</header>

<section class="cards">

<div class="card">

<h2 id="total">0</h2>

<p>Total</p>

</div>

<div class="card">

<h2 id="transito">0</h2>

<p>Em Trânsito</p>

</div>

<div class="card">

<h2 id="finalizadas">0</h2>

<p>Finalizadas</p>

</div>

<div class="card">

<h2 id="canceladas">0</h2>

<p>Canceladas</p>

</div>

</section>

<section>

<input
id="pesquisa"
placeholder="Pesquisar viagem ou cliente..."
>

</section>

<table>

<thead>

<tr>

<th>Status</th>

<th>Viagem</th>

<th>Cliente</th>

<th>Placa</th>

<th>Volumes</th>

</tr>

</thead>

<tbody id="tbody">

</tbody>

</table>

script.js

</body>

</html>

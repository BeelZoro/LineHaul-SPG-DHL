<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>DHL Line Haul</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Segoe UI, sans-serif;
            background:#f4f4f4;
        }

        header{
            background:#d40511;
            color:white;
            padding:20px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:15px;
            padding:20px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        .card h2{
            color:#d40511;
        }

        input{
            width:calc(100% - 40px);
            padding:12px;
            margin:20px;
            border:1px solid #ddd;
            border-radius:8px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th{
            background:#d40511;
            color:white;
        }

        th,
        td{
            padding:12px;
            border:1px solid #ddd;
            text-align:left;
        }

        tr:hover{
            background:#fff4f4;
        }

    </style>

</head>

<body>

<header>
    <h1>🚚 DHL Line Haul Dashboard</h1>
    <p id="dataAtual"></p>
</header>

<section class="cards">

    <div class="card">
        <h2 id="total">0</h2>
        <p>Total Viagens</p>
    </div>

    <div class="card">
        <h2 id="transito">0</h2>
        <p>Em Trânsito</p>
    </div>

    <div class="card">
        <h2 id="finalizadas">0</h2>
        <p>Finalizadas</p>
    </div>

    <div class="card">
        <h2 id="canceladas">0</h2>
        <p>Canceladas</p>
    </div>

</section>

<section>
    <input
        id="pesquisa"
        placeholder="Pesquisar viagem ou cliente..."
    >
</section>

<table>

    <thead>
        <tr>
            <th>Status</th>
            <th>Viagem</th>
            <th>Cliente</th>
            <th>Placa</th>
            <th>Volumes</th>
        </tr>
    </thead>

    <tbody id="tbody"></tbody>

</table>

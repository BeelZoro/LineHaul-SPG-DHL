<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>DHL Line Haul Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Segoe UI, sans-serif;
            background:#f4f4f4;
        }

        header{
            background:#d40511;
            color:white;
            padding:30px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
            padding:25px;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0 4px 12px rgba(0,0,0,.1);
        }

        .card h2{
            color:#d40511;
            font-size:40px;
        }

        .card p{
            margin-top:10px;
            font-size:18px;
        }

        input{
            width:calc(100% - 50px);
            margin:0 25px 25px 25px;
            padding:15px;
            border:2px solid #333;
            border-radius:10px;
            font-size:16px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th{
            background:#d40511;
            color:white;
            text-align:left;
        }

        th,td{
            padding:15px;
            border:1px solid #ddd;
        }

        tr{
            cursor:pointer;
        }

        tr:hover{
            background:#fff4f4;
        }

        #detalhes{
            display:none;
            margin:25px;
            background:white;
            border-radius:12px;
            padding:25px;
            box-shadow:0 4px 12px rgba(0,0,0,.1);
        }

        #detalhes h2{
            color:#d40511;
            margin-bottom:15px;
        }

        #detalhes p{
            margin:10px 0;
            font-size:16px;
        }

    </style>

    <script src="xlsx.full.min.js"></script>
    
</head>
    
<body>

<header>

    <h1>🚚 DHL Line Haul Dashboard</h1>

    <p id="dataAtual"></p>

</header>

<section class="cards">

    <div class="card">
        <h2 id="total">0</h2>
        <p>Total Viagens</p>
    </div>

    <div class="card">
        <h2 id="transito">0</h2>
        <p>Em Trânsito</p>
    </div>

    <div class="card">
        <h2 id="finalizadas">0</h2>
        <p>Finalizadas</p>
    </div>

    <div class="card">
        <h2 id="canceladas">0</h2>
        <p>Canceladas</p>
    </div>

</section>
<div style="padding:25px;">

    <input
        type="file"
        id="uploadExcel"
        accept=".xlsx"
    >

    <button
        onclick="enviarParaGitHub()"
        style="
        background:#d40511;
        color:white;
        border:none;
        padding:12px 20px;
        border-radius:8px;
        cursor:pointer;
        ">
        📤 Atualizar Planilha
    </button>

</div>
<input
    type="text"
    id="pesquisa"
    placeholder="Pesquisar viagem ou cliente..."
    autocomplete="off"
>

<table>

    <thead>

        <tr>
            <th>Status</th>
            <th>Viagem</th>
            <th>Cliente</th>
            <th>Placa</th>
            <th>Volumes</th>
        </tr>

    </thead>

    <tbody id="tbody"></tbody>

</table>

<div id="detalhes">

    <h2>🚚 Detalhes da Viagem</h2>

    <hr style="margin:15px 0;">

    <p><strong>Viagem:</strong> <span id="detViagem"></span></p>

    <p><strong>Cliente:</strong> <span id="detCliente"></span></p>

    <p><strong>Placa:</strong> <span id="detPlaca"></span></p>

    <p><strong>Volumes:</strong> <span id="detVolumes"></span></p>

    <p><strong>Status:</strong> <span id="detStatus"></span></p>

    <p><strong>Linha:</strong> <span id="detLinha"></span></p>

    <p><strong>Notas:</strong> <span id="detNotas"></span></p>

    <p><strong>Prazo:</strong> <span id="detPrazo"></span></p>

    <p><strong>Ops Clock:</strong> <span id="detOpsClock"></span></p>

    <p><strong>Chegada Real:</strong><span id="detChegadaReal"></span></p>

    <p><strong>Lead Time:</strong> <span id="detLeadTime"></span></p>

    <p><strong>Delta:</strong> <span id="detDelta"></span></p>

    <p><strong>Observação:</strong> <span id="detObs"></span></p>
</div>

<script>

async function carregarDados(){

    try{

        const resposta =
        await fetch("DIARIO.xlsx");

        const arrayBuffer =
        await resposta.arrayBuffer();

        const workbook =
        XLSX.read(
            arrayBuffer,
            { type:"array" }
        );

        console.log(
            "ABAS:",
            workbook.SheetNames
        );

        const aba =
        workbook.Sheets["REPORT"];

        const linhas =
        XLSX.utils.sheet_to_json(
        aba,
        {
        header:1
        }
    );
        
console.log(linhas[0]);
console.log(linhas[1]);
console.log(linhas[2]);
        
       const cabecalho = linhas[0];

const viagens = linhas
.slice(1)
.filter(l => l.length > 0)
.map(l => ({

    DATA: l[0],
    CLIENTE: l[1],
    STATUS: l[2],
    VIAGEM: l[3],
    LINHA: l[4],
    PLACA_CARRETA: l[5],
    NOTAS: l[6],
    VOLUMES: l[7],
    PRAZOS: l[8],
    OPS_CLOCK: l[9],
    CHEGADA_REAL: l[10],
    LEAD_TIME: l[11],
    OBS: l[12]

}));

async function enviarParaGitHub() {

    const file =
    document.getElementById(
        "uploadExcel"
    ).files[0];

    if(!file){

        alert("Selecione uma planilha.");

        return;

    }

    const token =
    prompt("Cole seu Token GitHub:");

    if(!token){

        alert("Token obrigatório.");

        return;

    }

    const base64 =
    await new Promise(resolve => {

        const reader =
        new FileReader();

        reader.onload = () =>
        resolve(
            reader.result.split(",")[1]
        );

        reader.readAsDataURL(file);

    });

    let sha = null;

    const getFile =
    await fetch(
        "https://api.github.com/repos/BeelZoro/LineHaul-SPG-DHL/contents/LINEHAUL.xlsx?ref=main",
        {
            headers:{
                Authorization:
                "token " + token
            }
        }
    );

    if(getFile.ok){

        const dados =
        await getFile.json();

        sha = dados.sha;

    }

    const upload =
    await fetch(
        "https://api.github.com/repos/BeelZoro/LineHaul-SPG-DHL/contents/LINEHAUL.xlsx",
        {
            method:"PUT",

            headers:{
                Authorization:
                "token " + token,

                "Content-Type":
                "application/json"
            },

            body:JSON.stringify({

                message:
                "Atualização via Dashboard",

                content:base64,

                sha:sha,

                branch:"main"

            })
        }
    );

    if(upload.ok){

        alert("✅ Planilha enviada!");

        location.reload();

    }else{

        alert("Erro no upload.");

    }

}    
    
function atualizarData() {

    document.getElementById("dataAtual").innerText =
    new Date().toLocaleString("pt-BR");

}

setInterval(atualizarData,1000);

atualizarData();

function renderizarDashboard(viagens){

    document.getElementById("total").innerText =
    viagens.length;

    document.getElementById("transito").innerText =
    viagens.filter(
    v => (v.STATUS || "") === "EM TRÂNSITO"
    ).length;

    document.getElementById("finalizadas").innerText =
    viagens.filter(
    v => (v.STATUS || "") === "FINALIZADA"
    ).length;

    document.getElementById("canceladas").innerText =
    viagens.filter(
    v => (v.STATUS || "") === "CANCELADA"
    ).length;


    const tbody =
    document.getElementById("tbody");

    tbody.innerHTML = "";

    viagens.forEach(v => {

        const linha = document.createElement("tr");

        linha.innerHTML = `
            <td>${v.STATUS ?? ""}</td>
            <td>${v.VIAGEM ?? ""}</td>
            <td>${v.CLIENTE ?? ""}</td>
            <td>${v.PLACA_CARRETA ?? ""}</td>
            <td>${v.VOLUMES ?? ""}</td>
        `;

        linha.onclick = function(){

            document.getElementById("detalhes").style.display = "block";

            document.getElementById("detViagem")
            .innerText = v.VIAGEM || "";

            document.getElementById("detCliente")
            .innerText = v.CLIENTE || "";

            document.getElementById("detPlaca")
            .innerText = v.PLACA_CARRETA || "";

            document.getElementById("detVolumes")
            .innerText = v.VOLUMES || "";

            document.getElementById("detStatus")
            .innerText = v.STATUS || "";

            document.getElementById("detLinha")
            .innerText = v.LINHA ?? "";

            document.getElementById("detNotas")
            .innerText = v.NOTAS ?? "";
            
            document.getElementById("detPrazo")
            .innerText = v.PRAZOS ?? "";
            
            document.getElementById("detOpsClock")
            .innerText = v.OPS_CLOCK ?? "";
            
            document.getElementById("detChegadaReal")
            .innerText = v.CHEGADA_REAL ?? "";
            
            document.getElementById("detLeadTime")
            .innerText = v.LEAD_TIME ?? "";
            
            document.getElementById("detObs")
            .innerText = v.OBS ?? "";

            document.getElementById("detDelta")
            .innerText =
            calcularDelta(
            v.OPS_CLOCK,
            v.CHEGADA_REAL
    );

    document.getElementById("detalhes")
    .scrollIntoView({
        behavior:"smooth"
    });

};

        tbody.appendChild(linha);

    });

}
    
function calcularDelta(
    opsClock,
    chegadaReal
){

    if(!opsClock || !chegadaReal){

        return "-";

    }

    const ops =
    Number(opsClock);

    const chegada =
    Number(chegadaReal);

    if(
        isNaN(ops) ||
        isNaN(chegada)
    ){

        return "-";

    }

    const minutos =
    Math.round(
        (chegada - ops) * 1440
    );

    if(minutos > 0){

    return "+" + minutos + " min (ATRASADO)";

    }

    return minutos + " min (DENTRO DO OC)";

    }
    
carregarDados();
    
</script>

</body>
</html>
